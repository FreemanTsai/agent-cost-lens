<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Claude Monitor</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      :root{--bg:#0d0d0d;--bg-card:#1a1a1a;--bg-surface:#222;--border:#2e2e2e;--accent:#ffb1ee;--accent-subtle:rgba(255,177,238,.1);--text:#ededed;--text-secondary:#a0a0a0;--text-muted:#666;--font:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--font-mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--radius:16px;--page-pad-top:calc(16px + env(safe-area-inset-top));--page-pad-right:calc(16px + env(safe-area-inset-right));--page-pad-bottom:calc(16px + env(safe-area-inset-bottom));--page-pad-left:calc(16px + env(safe-area-inset-left))}
      body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:var(--page-pad-top) var(--page-pad-right) var(--page-pad-bottom) var(--page-pad-left)}
      .app{width:calc(100dvw - var(--page-pad-left) - var(--page-pad-right));max-width:800px;min-width:0;display:grid;grid-template-rows:repeat(2,minmax(0,1fr));gap:12px}
      @media(orientation:landscape) and (max-height:500px){:root{--page-pad-top:calc(10px + env(safe-area-inset-top));--page-pad-right:calc(2px + env(safe-area-inset-right));--page-pad-bottom:calc(10px + env(safe-area-inset-bottom));--page-pad-left:calc(2px + env(safe-area-inset-left))}}
      @media(orientation:landscape),(min-width:768px){.app{grid-template-columns:repeat(2,minmax(0,1fr));grid-template-rows:1fr;gap:16px;max-width:900px}.usage-card{grid-column:1}.sessions-list{grid-column:2;grid-row:1}}
      .glass-card{background:rgba(26,26,26,.55);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.04);padding:20px 16px}
      .glass-card,.session-card{min-width:0}.usage-card{position:relative;overflow:hidden}.card-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}.logo-mark{width:122px;height:28px;display:block;flex-shrink:0}.wordmark{font-size:22px;font-weight:700;line-height:1}.text-wordmark{letter-spacing:0;position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}.card-subtitle{font-size:13px;color:var(--text-secondary);margin-left:auto}
      .pill{display:inline-block;padding:2px 10px;border-radius:999px;background:var(--accent-subtle);color:var(--accent);font-size:11px;font-weight:600;border:1px solid rgba(255,177,238,.15)}.limit-row{margin-top:18px}.limit-row:first-child{margin-top:0}.limit-label{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;margin-bottom:6px}.limit-label span:last-child{font-family:var(--font-mono);font-size:14px}.bar-track{display:block;width:100%;height:8px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}.bar-fill{display:block;height:100%;border-radius:999px;transition:width .5s ease;background:linear-gradient(90deg,#22d3ee,#facc15,#f97316)}.bar-fill.high{background:linear-gradient(90deg,#facc15,#f97316,#ef4444)}.reset-info{font-size:11px;color:var(--text-muted);margin-top:4px;font-family:var(--font-mono)}
      .sessions-list{display:flex;flex-direction:column;gap:12px;height:100%;min-width:0;min-height:0}.session-card{cursor:pointer;transition:transform .36s cubic-bezier(.2,.8,.2,1),background .15s,border-color .15s}.session-card:hover{background:rgba(34,34,34,.75);border-color:rgba(255,255,255,.12)}.session-row{display:flex;align-items:center;justify-content:space-between;gap:12px}.session-id{font-family:var(--font-mono);font-size:13px;color:var(--text-secondary);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.session-cost{font-family:var(--font-mono);font-weight:700;color:var(--accent);font-size:14px;white-space:nowrap}.session-preview{margin-top:8px;color:var(--text-muted);font-size:12px;line-height:1.35;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}.empty-state{color:var(--text-muted);font-size:13px;text-align:center;padding:24px}.skeleton{background:linear-gradient(90deg,#222,#2a2a2a,#222);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px}.skeleton-text{height:14px}.skeleton-bar{height:8px;margin-top:12px}.session-moving{z-index:2}@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
  </head>
  <body>
    <div class="app" id="app"></div>
    <script>
      const money = (value) => `$${Number(value || 0).toFixed(4)}`;
      const escapeHtml = (s) => String(s ?? "").replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));

      function timeRemaining(seconds) {
        if (!seconds || seconds <= 0) return "resetting…";
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        if (h > 24) return `${Math.floor(h / 24)}d ${h % 24}h`;
        if (h > 0) return `${h}h ${m}m`;
        return `${m}m`;
      }

      function remainingPercent(usedPercent) {
        return Math.max(0, Math.min(100, 100 - Number(usedPercent || 0)));
      }

      function formatRemainingPercent(usedPercent) {
        const remaining = remainingPercent(usedPercent);
        const label = Number.isInteger(remaining) ? String(remaining) : remaining.toFixed(1).replace(/\.0$/, "");
        return `${label}% left`;
      }

      function absoluteResetTime(seconds, includeDate = false) {
        if (!seconds || seconds <= 0) return "";
        const d = new Date(Date.now() + seconds * 1000);
        const h = d.getHours();
        const hour = String(h % 12 || 12).padStart(2, "0");
        const min = String(d.getMinutes()).padStart(2, "0");
        const clock = `${hour}:${min} ${h >= 12 ? "PM" : "AM"}`;
        if (!includeDate) return clock;
        const month = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
        return `${month} ${d.getDate()} ${clock}`;
      }

      function resetText(seconds, includeDate = false) {
        const absolute = absoluteResetTime(seconds, includeDate);
        return absolute ? `${timeRemaining(seconds)} (${absolute})` : timeRemaining(seconds);
      }

      function renderLimitRow(label, key, window, includeDate = false) {
        if (!window) return "";
        const width = remainingPercent(window.used_percent);
        const barClass = width < 30 ? "bar-fill high" : "bar-fill";
        return `
          <div class="limit-row">
            <div class="limit-label"><span>${escapeHtml(label)}</span><span class="js-flip" data-key="${escapeHtml(key)}">${formatRemainingPercent(window.used_percent)}</span></div>
            <span class="bar-track"><span class="${barClass}" style="width:${width}%"></span></span>
            <div class="reset-info">↻ Reset in ${resetText(window.reset_after_seconds, includeDate)}</div>
          </div>`;
      }

      function renderLimitGroup(title, rows) {
        const content = rows.filter(Boolean).join("");
        if (!content) return "";
        return `<div class="limit-group">${title ? `<div class="limit-group-title">${escapeHtml(title)}</div>` : ""}${content}</div>`;
      }

      function renderRateLimits(rl) {
        const primary = rl?.rate_limit?.primary_window;
        const secondary = rl?.rate_limit?.secondary_window;
        const sonnet = (rl?.additional_rate_limits || [])[0];
        return `
        <div class="glass-card usage-card">
          <div class="card-header">
            <img class="logo-mark" src="claude-color.svg" alt="" />
            <span class="wordmark text-wordmark">Claude</span>
            <span class="card-subtitle">Monitor</span>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">
            <span class="pill">${escapeHtml(rl?.plan_type || "claude")}</span>
          </div>
          ${renderLimitGroup(null, [
            renderLimitRow("5h", "5h", primary),
            renderLimitRow("weekly", "7d", secondary, true),
          ])}
          ${renderLimitGroup(sonnet?.limit_name, [
            renderLimitRow("weekly", "sonnet-weekly", sonnet?.rate_limit?.secondary_window, true),
          ])}
        </div>`;
      }

      function renderUsageCard(data) {
        if (data?.rate_limit) return renderRateLimits(data);
        return `
        <div class="glass-card usage-card">
          <div class="card-header">
            <img class="logo-mark" src="claude-color.svg" alt="" />
            <span class="wordmark text-wordmark">Claude</span>
            <span class="card-subtitle">Monitor</span>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">
            <span class="pill">No rate limit</span>
          </div>
          <div class="empty-state">No Claude rate limit data</div>
        </div>`;
      }

      function renderSessionCards(sessions) {
        if (!sessions || !sessions.length) return '<div class="empty-state">No recent sessions</div>';
        return sessions.map((s) => {
          const shortId = (s.sessionId || "").slice(0, 12);
          return `
          <div class="glass-card session-card" data-session-id="${escapeHtml(s.sessionId)}">
            <div class="session-row">
              <span class="session-id">${escapeHtml(shortId)}…</span>
              <span class="session-cost">${money(s.costUsd)}</span>
            </div>
            ${s.preview ? `<div class="session-preview">${escapeHtml(s.preview)}</div>` : ""}
          </div>`;
        }).join("");
      }

      function renderSkeleton() {
        return `
        <div class="glass-card usage-card">
          <div class="card-header"><div class="skeleton" style="width:28px;height:28px;border-radius:6px"></div><div class="skeleton skeleton-text" style="width:80px"></div></div>
          <div class="skeleton skeleton-bar"></div>
          <div class="skeleton skeleton-bar" style="width:70%"></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${Array(5).fill('<div class="glass-card" style="padding:14px 16px"><div class="skeleton skeleton-text" style="width:70%"></div></div>').join("")}
        </div>`;
      }

      function getSessionCardPositions() {
        const positions = new Map();
        document.querySelectorAll(".session-card[data-session-id]").forEach((el) => {
          positions.set(el.dataset.sessionId, el.getBoundingClientRect());
        });
        return positions;
      }

      function animateSessionMoves(oldPositions) {
        if (!oldPositions?.size) return;
        if (window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches) return;
        document.querySelectorAll(".session-card[data-session-id]").forEach((el) => {
          const oldRect = oldPositions.get(el.dataset.sessionId);
          if (!oldRect) return;
          const newRect = el.getBoundingClientRect();
          const dx = oldRect.left - newRect.left;
          const dy = oldRect.top - newRect.top;
          if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
          el.classList.add("session-moving");
          el.style.transition = "transform 0s";
          el.style.transform = `translate(${dx}px, ${dy}px)`;
          el.getBoundingClientRect();
          requestAnimationFrame(() => {
            el.style.transition = "";
            el.style.transform = "";
            el.addEventListener("transitionend", () => el.classList.remove("session-moving"), { once: true });
          });
        });
      }

      async function fetchMonitor() {
        const app = document.getElementById("app");
        const oldSessionPositions = getSessionCardPositions();
        try {
          await fetch('/api/claude-reparse', { cache: 'no-store' });
          const res = await fetch('/api/claude-monitor', { cache: 'no-store' });
          const data = await res.json();
          app.innerHTML = renderUsageCard(data.rateLimits) + `<div class="sessions-list">${renderSessionCards(data.sessions)}</div>`;
          animateSessionMoves(oldSessionPositions);
        } catch (err) {
          app.innerHTML = renderUsageCard({}) + `<div class="sessions-list"><div class="empty-state">${escapeHtml(err.message)}</div></div>`;
        }
      }

      function init() {
        document.getElementById("app").innerHTML = renderSkeleton();
        fetchMonitor();
        setInterval(fetchMonitor, 30000);
      }

      init();
    </script>
  </body>
</html>
